version: '3.9'

networks:
  legalitt-net:
    driver: bridge
  legalitt-internal:
    driver: bridge
    internal: true

volumes:
  mongo-data:
  redis-data:
  nginx-logs:
  api-logs:

services:

  redis:
    image: redis:7.2-alpine
    container_name: legalitt-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-legalitt_redis_dev}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - legalitt-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-legalitt_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: legalitt-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-legalitt}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-legalitt_dev_pass}
      MONGO_INITDB_DATABASE: legalitt
    volumes:
      - mongo-data:/data/db
    networks:
      - legalitt-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
    profiles:
      - local

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD:-legalitt_redis_dev}@redis:6379
    volumes:
      - api-logs:/app/logs
    networks:
      - legalitt-net
      - legalitt-internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.25-alpine
    container_name: legalitt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - legalitt-net
    depends_on:
      - api
